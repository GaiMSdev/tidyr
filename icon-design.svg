<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>

    <!-- Background: deep blue → purple -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1E3A8A"/>
      <stop offset="50%"  stop-color="#3730A3"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <!-- Soft top-left glow -->
    <radialGradient id="bgGlow" cx="30%" cy="20%" r="52%">
      <stop offset="0%"   stop-color="#60A5FA" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom-right vignette for depth -->
    <radialGradient id="vignette" cx="80%" cy="85%" r="48%">
      <stop offset="0%"   stop-color="#0F0A2E" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0F0A2E" stop-opacity="0"/>
    </radialGradient>

    <!-- Sparkle: warm gold -->
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Shared bar drop shadow -->
    <filter id="barShadow" x="-25%" y="-15%" width="150%" height="135%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1E1B4B" flood-opacity="0.40"/>
    </filter>

    <!-- Sparkle drop shadow -->
    <filter id="sparkleShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#78350F" flood-opacity="0.50"/>
    </filter>

    <!-- Text drop shadow for legibility -->
    <filter id="textShadow" x="-5%" y="-20%" width="110%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1E1B4B" flood-opacity="0.45"/>
    </filter>

  </defs>

  <!-- ── Background ── -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bgGlow)"/>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#vignette)"/>

  <!-- ── Sort bars: ascending left → right, white at rising opacity ── -->
  <g filter="url(#barShadow)">
    <rect x="288" y="500" width="72" height="110" rx="18" fill="white" opacity="0.38"/>
    <rect x="382" y="445" width="72" height="165" rx="18" fill="white" opacity="0.54"/>
    <rect x="476" y="385" width="72" height="225" rx="18" fill="white" opacity="0.70"/>
    <rect x="570" y="325" width="72" height="285" rx="18" fill="white" opacity="0.85"/>
    <rect x="664" y="265" width="72" height="345" rx="18" fill="white" opacity="1.00"/>
  </g>

  <!-- White cap-line highlight at top of each bar (glass reflection) -->
  <g opacity="0.55">
    <rect x="288" y="500" width="72" height="6" rx="3" fill="white"/>
    <rect x="382" y="445" width="72" height="6" rx="3" fill="white"/>
    <rect x="476" y="385" width="72" height="6" rx="3" fill="white"/>
    <rect x="570" y="325" width="72" height="6" rx="3" fill="white"/>
    <rect x="664" y="265" width="72" height="6" rx="3" fill="white"/>
  </g>

  <!-- ── Sparkle — top-right, above tallest bar ── -->
  <g transform="translate(796, 244)" filter="url(#sparkleShadow)">
    <!-- Primary 4-pointed star -->
    <path d="M0,-56 C4,-23 23,-4 56,0 C23,4 4,23 0,56 C-4,23 -23,4 -56,0 C-23,-4 -4,-23 0,-56 Z"
          fill="url(#sparkleGrad)"/>
    <!-- 45° rotated secondary star (smaller) -->
    <path d="M0,-30 C2,-12 12,-2 30,0 C12,2 2,12 0,30 C-2,12 -12,2 -30,0 C-12,-2 -2,-12 0,-30 Z"
          fill="#FEF9C3" opacity="0.78" transform="rotate(45)"/>
    <!-- Centre glint -->
    <circle cx="0" cy="0" r="7" fill="white" opacity="0.92"/>
  </g>

  <!-- ── "tidyr" wordmark ── -->
  <text
    x="512"
    y="800"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="148"
    font-weight="700"
    letter-spacing="10"
    fill="white"
    opacity="0.96"
    filter="url(#textShadow)">tidyr</text>

  <!-- Thin separator line between bars and text -->
  <line x1="308" y1="650" x2="716" y2="650"
        stroke="white" stroke-width="1.5" stroke-opacity="0.18" stroke-linecap="round"/>

</svg>
