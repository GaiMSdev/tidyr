name: Tidyr
options:
  bundleIdPrefix: com.tidyr
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

targets:
  Tidyr:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tidyr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tidyr.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_CFBundleDisplayName: Tidyr
    entitlements:
      path: Tidyr/Tidyr.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true

schemes:
  Tidyr:
    build:
      targets:
        Tidyr: all
    run:
      config: Debug
    archive:
      config: Release
